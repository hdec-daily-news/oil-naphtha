name: Daily Oil/Naphtha Update

on:
  schedule:
    # KST 오전 7:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: python auto_oil.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html oil_naphtha.csv
          git diff --staged --quiet || git commit -m "Daily update $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
