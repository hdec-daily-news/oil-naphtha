name: Daily Oil/Naphtha Update

on:
  schedule:
    # 오전 (KST 06:40, 06:55) — 2회 재시도
    - cron: '40 21 * * *'
    - cron: '55 21 * * *'
    # 오후 (KST 12:00~12:30, 5분 간격 7회) — GitHub 크론 누락 대비 밀도 증가
    - cron: '0 3 * * *'
    - cron: '5 3 * * *'
    - cron: '10 3 * * *'
    - cron: '15 3 * * *'
    - cron: '20 3 * * *'
    - cron: '25 3 * * *'
    - cron: '30 3 * * *'
  workflow_dispatch:

concurrency:
  group: daily-oil-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Skip if already updated this slot
        id: guard
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          NOW_H=$((10#$(TZ=Asia/Seoul date +%H)))
          LAST_ISO=$(git log -1 --pretty=%cI)
          LAST_H=$((10#$(TZ=Asia/Seoul date -d "$LAST_ISO" +%H)))
          LAST_D=$(TZ=Asia/Seoul date -d "$LAST_ISO" +%Y-%m-%d)
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          if [ "$NOW_H" -ge 12 ] && [ "$LAST_D" = "$TODAY" ] && [ "$LAST_H" -ge 12 ]; then
            echo "Already updated today afternoon ($LAST_ISO) — skip"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "$NOW_H" -lt 12 ] && [ "$LAST_D" = "$TODAY" ] && [ "$LAST_H" -lt 12 ] && [ "$LAST_H" -ge 6 ]; then
            echo "Already updated today morning ($LAST_ISO) — skip"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run collector
        if: steps.guard.outputs.skip != 'true'
        run: python auto_oil.py

      - name: Commit and push
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html oil_naphtha.csv
          git diff --staged --quiet || git commit -m "Daily update $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
