name: Daily Oil/Naphtha Update

on:
  schedule:
    # KST 06:40 (UTC 21:40) — 정각은 GitHub 크론 혼잡으로 스킵되므로 off-peak 사용
    - cron: '40 21 * * *'
    # KST 06:55 (UTC 21:55) — 1차 실패 대비 재시도
    - cron: '55 21 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: python auto_oil.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html oil_naphtha.csv
          git diff --staged --quiet || git commit -m "Daily update $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
